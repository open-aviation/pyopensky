name: tests

on:
  push:
  pull_request_target:
  schedule: # keep the cache warm
    - cron: "42 3 * * 0" # every Sunday morning
  workflow_dispatch:

jobs:
  lint:
    name: lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - run: uv sync --dev --extra rs1090 --extra cartes
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv cache prune --ci

  typing:
    name: type checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - run: uv sync --dev --extra rs1090 --extra cartes
      - run: uv run ty check src tests
      - run: uv cache prune --ci

  fill_cache:
    name: fill trino cache
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - uses: actions/cache@v5
        id: cache
        with:
          path: cache_opensky
          enableCrossOsArchive: true
          key: opensky-${{ hashFiles('uv.lock') }}

      - run: uv sync --dev --extra rs1090 --extra cartes

      - name: Fill cache with Trino queries
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          OPENSKY_USERNAME: ${{ secrets.OPENSKY_USERNAME }}
          OPENSKY_PASSWORD: ${{ secrets.OPENSKY_PASSWORD }}
          OPENSKY_CACHE: ${{ github.workspace }}/cache_opensky
        run: uv run pytest tests/test_trino.py tests/test_rebuild.py

      - run: uv cache prune --ci

  tests:
    name: python-${{ matrix.python-version }} on ${{ matrix.os }}
    needs: fill_cache
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          # `trino` (v0.336.0) depends on `orjson` (v3.11.5)
          # which does not support Python 3.14t
          # https://github.com/ijl/orjson/issues/591#issuecomment-3160351169
          # - "3.14t"
        exclude:
          # greenlet v3.2.4 is not available for Python 3.14t on Windows
          # and fails to compile there. Not much we can do about that right now.
          - os: windows-latest
            python-version: "3.14t"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - uses: actions/cache@v5
        with:
          path: cache_opensky
          enableCrossOsArchive: true
          key: opensky-${{ hashFiles('uv.lock') }}

      - run: uv sync --dev --python ${{ matrix.python-version }} --extra rs1090 --extra cartes

      - name: Run tests
        env:
          OPENSKY_USERNAME: ${{ secrets.OPENSKY_USERNAME }}
          OPENSKY_PASSWORD: ${{ secrets.OPENSKY_PASSWORD }}
          OPENSKY_CACHE: ${{ github.workspace }}/cache_opensky
        run: |
          if [ -z "${OPENSKY_USERNAME}" ] || [ -z "${OPENSKY_PASSWORD}" ]; then
            echo "OPENSKY credentials not set: skipping tests."
            exit 0
          fi
          uv run pytest

      - run: uv cache prune --ci
